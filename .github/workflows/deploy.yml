name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://plwpfnbhyzblgvliiole.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_yusGAVx2uI09v0mL145WUQ_hE_C-Ulk
          NEXT_PUBLIC_BUS_API_KEY: 153cfdfc17d77d7fd2251ff0cd73e0b93f161b2a6a07c716d46b28c6bcf3ad0d
          NEXT_PUBLIC_MOLIT_API_KEY: ${{ secrets.NEXT_PUBLIC_MOLIT_API_KEY }}
          NEXT_PUBLIC_NAVER_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_NAVER_CLIENT_ID }}
          NEXT_PUBLIC_NAVER_CLIENT_SECRET: ${{ secrets.NEXT_PUBLIC_NAVER_CLIENT_SECRET }}
          NEXT_PUBLIC_BASE_PATH: /geumdan-app
          NEXT_PUBLIC_YOUTUBE_API_KEY: ${{ secrets.NEXT_PUBLIC_YOUTUBE_API_KEY }}
          NEXT_PUBLIC_ADMIN_DB_KEY: ${{ secrets.NEXT_PUBLIC_ADMIN_DB_KEY }}
          NEXT_PUBLIC_ADMIN_PASSWORD: ${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}

      - name: Add .nojekyll (fix _next folder 404)
        run: touch ./out/.nojekyll

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: out
          branch: gh-pages
          clean: true
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com
