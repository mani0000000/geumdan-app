# ⛔ GitHub Pages 배포 비활성화 — Vercel(geumdan-app.vercel.app)에서만 배포
# 이 워크플로우는 실행되지 않습니다.
name: Deploy to GitHub Pages (DISABLED)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "GitHub Pages 배포를 의도적으로 실행하려면 'yes' 입력"
        required: true
        default: "no"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Remove API routes (incompatible with static export)
        run: mv app/api ./api_temp

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://plwpfnbhyzblgvliiole.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_yusGAVx2uI09v0mL145WUQ_hE_C-Ulk
          NEXT_PUBLIC_BUS_API_KEY: 153cfdfc17d77d7fd2251ff0cd73e0b93f161b2a6a07c716d46b28c6bcf3ad0d
          NEXT_PUBLIC_MOLIT_API_KEY: ${{ secrets.NEXT_PUBLIC_MOLIT_API_KEY }}
          NEXT_PUBLIC_NAVER_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_NAVER_CLIENT_ID }}
          NEXT_PUBLIC_NAVER_CLIENT_SECRET: ${{ secrets.NEXT_PUBLIC_NAVER_CLIENT_SECRET }}
          NEXT_PUBLIC_BASE_PATH: /geumdan-app
          NEXT_PUBLIC_YOUTUBE_API_KEY: ${{ secrets.NEXT_PUBLIC_YOUTUBE_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}

      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
