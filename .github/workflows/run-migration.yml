name: Run Migration (one-time)
on:
  workflow_dispatch:  # 수동 실행 전용

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - name: Run gas_stations migration
        run: node -e "
const { createClient } = require('@supabase/supabase-js');
const sb = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_KEY, {
  auth: { autoRefreshToken: false, persistSession: false }
});

const SQL = \`
create table if not exists gas_stations (
  id            bigserial primary key,
  name          text        not null,
  brand_code    text        not null default 'ETC',
  brand_name    text        not null,
  area          text        not null,
  address       text        not null,
  lat           double precision not null,
  lng           double precision not null,
  opinet_id     text,
  is_self       boolean     not null default false,
  is_alttul     boolean     not null default false,
  sort_order    int         not null default 0,
  active        boolean     not null default true,
  created_at    timestamptz not null default now()
);

create index if not exists idx_gas_stations_area on gas_stations(area);
alter table gas_stations enable row level security;
\`;

