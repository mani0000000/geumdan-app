  { name: '불로주유소',         brand_code: 'ETC', brand_name: '자가상표',     area: '불로동', address: '인천 서구 검단로 798',         lat: 37.5395, lng: 126.6650, is_self: false, is_alttul: false, sort_order: 190 },
  { name: '대곡주유소',         brand_code: 'ETC', brand_name: '자가상표',     area: '대곡동', address: '인천 서구 대곡로 214',         lat: 37.5350, lng: 126.6800, is_self: false, is_alttul: false, sort_order: 200 },
  { name: '대곡대로주유소',     brand_code: 'ETC', brand_name: '자가상표',     area: '대곡동', address: '인천 서구 대곡로 351',         lat: 37.5360, lng: 126.6820, is_self: false, is_alttul: false, sort_order: 210 },
];

async function run() {
  // 1. rpc로 테이블 생성 시도
  const { error: rpcErr } = await sb.rpc('exec_sql', { query: SQL }).catch(() => ({ error: 'no_rpc' }));
  if (rpcErr && rpcErr !== 'no_rpc') {
    console.log('rpc exec_sql 없음, Management API 시도...');
  }

  // 2. 직접 upsert — 테이블이 이미 있으면 바로 동작
  const { error: upsertErr, count } = await sb
    .from('gas_stations')
    .upsert(SEED, { onConflict: 'name', ignoreDuplicates: false })
    .select('id', { count: 'exact', head: true });

  if (upsertErr) {
    console.error('❌ upsert 실패:', upsertErr.message);
    console.log('→ 테이블이 없을 수 있습니다. SQL 마이그레이션 파일로 직접 실행해 주세요:');
    console.log('   supabase/migrations/20260523_gas_stations.sql');
    process.exit(1);
  }
  console.log('✅ gas_stations 시드 완료 — ' + SEED.length + '개');
}
run();
"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
