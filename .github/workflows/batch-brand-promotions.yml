name: Batch - Brand Promotions 3 Times Daily

on:
  push:
    branches: [main]
    paths:
      - 'scripts/batch/fetch-brand-promotions.mjs'
  schedule:
    # 07:10 / 15:10 / 23:10 KST (UTC 22:10 / 06:10 / 14:10)
    - cron: '10 6,14,22 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: geumdan-brand-promotions
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Collect official brand promotions
        run: node scripts/batch/fetch-brand-promotions.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PROMOTION_TRIGGER: schedule
