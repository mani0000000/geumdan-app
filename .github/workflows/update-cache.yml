name: Update Content Cache

on:
  schedule:
    - cron: '0 23 * * *'   # KST 08:00 (UTC 23:00 전날)
    - cron: '0 11 * * *'   # KST 20:00 (UTC 11:00)
  workflow_dispatch:          # Allow manual trigger

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch news, YouTube and Instagram cache
        run: node scripts/batch/fetch-cache.mjs
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}

      - name: Commit and push if cache changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/cache/
          git diff --staged --quiet || (
            git commit -m "chore: refresh news/youtube/instagram cache $(date -u '+%Y-%m-%d %H:%M UTC')" &&
            git push
          )
