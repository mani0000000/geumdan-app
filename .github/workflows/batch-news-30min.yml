name: Batch - News Every 30 Minutes

on:
  schedule:
    # 정각은 기존 hourly 배치가 담당하고, 이 워크플로는 30분 시점만 보완한다.
    - cron: '30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: batch-news-30min
  cancel-in-progress: false

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: node scripts/batch/fetch-news.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
