name: Batch - Backfill og:image
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no Supabase writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      concurrency:
        description: 'Parallel fetches'
        required: false
        default: '4'
        type: string

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: node scripts/batch/backfill-og-images.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CONCURRENCY: ${{ inputs.concurrency }}
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '' }}
