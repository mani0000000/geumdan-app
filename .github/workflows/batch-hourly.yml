name: Batch - Hourly
on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: geumdan-hourly-collectors
  cancel-in-progress: false
jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: node scripts/batch/fetch-news.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

  fetch-youtube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: node scripts/batch/fetch-youtube.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

  fetch-gas-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: node scripts/batch/fetch-gas-prices.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPINET_API_KEY: ${{ secrets.OPINET_API_KEY }}

  fetch-instagram:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: node scripts/batch/fetch-instagram.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HIKERAPI_KEY: ${{ secrets.HIKERAPI_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          # DB의 어드민 키워드가 우선이며 이 값은 초기/장애 시 폴백입니다.
          INSTAGRAM_HASHTAGS: ${{ secrets.INSTAGRAM_HASHTAGS || '검단신도시,검단소식,인천검단,검단구,검단맛집,검단신도시맛집,검단카페,검단신상맛집,검단브런치,검단베이커리,아라동맛집,원당동맛집,당하동맛집,검단가볼만한곳,검단핫플,검단데이트코스,검단아이랑,검단나들이,검단축제,검단행사,검단생활,검단교통,검단신규오픈,검단상가,검단운동,검단반려동물,검단육아,검단교육' }}
